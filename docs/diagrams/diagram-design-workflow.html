<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diagram-design workflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --accent: #eb6c36;
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 48px 32px;
    }

    .frame {
      width: min(100%, 1200px);
      margin: 0 auto;
      overflow-x: auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.12;
      margin-bottom: 24px;
    }

    svg {
      display: block;
      min-width: 960px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Flowchart · diagram-design</p>
    <h1>Standalone HTML/SVG diagram workflow</h1>

    <svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
      <title id="title">diagram-design 주요 workflow</title>
      <desc id="desc">다이어그램 요청이 전달 가치 확인, style guide gate, 타입별 reference와 template 선택, taste gate를 거쳐 standalone HTML/SVG 파일로 완성되는 흐름.</desc>
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <line x1="500" y1="88" x2="500" y2="120" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="500" y1="168" x2="500" y2="192" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="600" y1="240" x2="728" y2="240" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 808 264 C 808 304, 620 304, 620 352" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <line x1="500" y1="288" x2="500" y2="328" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="500" y1="376" x2="500" y2="416" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="500" y1="464" x2="500" y2="504" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

      <rect x="640" y="228" width="72" height="16" rx="2" fill="#f5f5f5"/>
      <text x="676" y="240" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">DEFAULT?</text>
      <rect x="480" y="476" width="40" height="16" rx="2" fill="#f5f5f5"/>
      <text x="500" y="488" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">PASS</text>

      <rect x="400" y="40" width="200" height="48" rx="24" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="500" y="68" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Diagram 요청</text>

      <rect x="388" y="120" width="224" height="48" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="140" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">전달 가치 확인</text>
      <text x="500" y="156" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">diagram vs prose/table</text>

      <polygon points="500,192 600,240 500,288 400,240" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="236" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Style guide gate</text>
      <text x="500" y="252" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">brand tokens</text>

      <rect x="728" y="216" width="160" height="48" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="808" y="236" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">브랜드 토큰 조정</text>
      <text x="808" y="252" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">onboarding or manual</text>

      <rect x="388" y="328" width="224" height="48" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="348" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">타입 선택</text>
      <text x="500" y="364" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">architecture / flow / sequence / er ...</text>

      <rect x="388" y="416" width="224" height="48" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="436" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Reference + template</text>
      <text x="500" y="452" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">type refs + light/dark/full assets</text>

      <rect x="388" y="504" width="224" height="56" rx="28" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="500" y="528" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Taste gate 통과</text>
      <text x="500" y="544" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">standalone html/svg</text>

      <line x1="40" y1="588" x2="960" y2="588" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>
      <text x="40" y="608" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace">LEGEND</text>
      <rect x="112" y="600" width="24" height="12" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="148" y="610" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Request / output</text>
      <rect x="288" y="600" width="24" height="12" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="324" y="610" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Design step</text>
      <polygon points="452,606 464,600 476,606 464,612" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="488" y="610" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Gate</text>
      <line x1="596" y1="608" x2="628" y2="608" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="640" y="610" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Final pass</text>
      <line x1="756" y1="608" x2="788" y2="608" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="800" y="610" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Customize branch</text>
    </svg>
  </main>
</body>
</html>

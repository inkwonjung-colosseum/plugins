<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Confluence document workflow overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --soft: #7a8399;
      --accent: #eb6c36;
      --link: #2e5aa8;
      --rule: rgba(45,49,66,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 48px 32px;
    }

    .frame {
      width: min(100%, 1120px);
      margin: 0 auto;
      overflow-x: auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.12;
      margin-bottom: 24px;
    }

    svg {
      display: block;
      min-width: 1040px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Overview · planning workflow</p>
    <h1>기획자가 따라가는 Confluence 문서 작업 흐름</h1>

    <svg viewBox="0 0 1040 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">

      <desc id="desc">원본 확인, 작업 범위 선택, 기획 초안 작성, 병렬 fresh-context reviewer 검증과 수정, Confluence 직접 반영과 확인으로 이어지는 5단계 요약 다이어그램.</desc>
      <defs>

          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <line x1="196" y1="176" x2="260" y2="176" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="396" y1="176" x2="460" y2="176" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="596" y1="176" x2="660" y2="176" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="796" y1="176" x2="860" y2="176" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>

      <path d="M 728 248 C 728 320, 528 320, 528 248" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <rect x="584" y="304" width="88" height="16" rx="2" fill="#f5f5f5"/>
      <text x="628" y="316" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">문제 있으면 수정</text>

      <rect x="60" y="112" width="136" height="128" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <rect x="76" y="128" width="28" height="16" rx="2" fill="transparent" stroke="rgba(45,49,66,0.20)" stroke-width="0.8"/>
      <text x="90" y="140" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">1</text>
      <text x="128" y="166" fill="#2d3142" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">원본 확인</text>
      <text x="128" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Confluence 기준</text>
      <text x="128" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">로컬 문서는 읽기 전용</text>

      <rect x="260" y="112" width="136" height="128" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="276" y="128" width="28" height="16" rx="2" fill="transparent" stroke="rgba(45,49,66,0.20)" stroke-width="0.8"/>
      <text x="290" y="140" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">2</text>
      <text x="328" y="166" fill="#2d3142" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">범위 정하기</text>
      <text x="328" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">만들 문서</text>
      <text x="328" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">수정할 문서</text>

      <rect x="460" y="112" width="136" height="128" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="476" y="128" width="28" height="16" rx="2" fill="transparent" stroke="rgba(235,108,54,0.35)" stroke-width="0.8"/>
      <text x="490" y="140" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">3</text>
      <text x="528" y="166" fill="#2d3142" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">초안 만들기</text>
      <text x="528" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">AI + 기획자</text>
      <text x="528" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">로컬 초안</text>

      <polygon points="728,104 812,176 728,248 644,176" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <rect x="684" y="128" width="28" height="16" rx="2" fill="#f5f5f5" stroke="rgba(235,108,54,0.35)" stroke-width="0.8"/>
      <text x="698" y="140" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">4</text>

      <text x="728" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">3개 reviewer</text>

      <rect x="860" y="112" width="136" height="128" rx="6" fill="#ffffff" stroke="#2e5aa8" stroke-width="1"/>
      <rect x="876" y="128" width="28" height="16" rx="2" fill="transparent" stroke="rgba(46,90,168,0.35)" stroke-width="0.8"/>
      <text x="890" y="140" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">5</text>
      <text x="928" y="166" fill="#2d3142" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">직접 반영</text>
      <text x="928" y="188" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">팀 발행 절차 기준</text>
      <text x="928" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">반영 후 확인</text>

      <line x1="84" y1="360" x2="956" y2="360" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>
      <text x="84" y="384" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">실무 기준</text>

      <rect x="84" y="408" width="224" height="72" rx="6" fill="#ffffff" stroke="rgba(45,49,66,0.20)" stroke-width="1"/>
      <text x="108" y="432" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif">원칙</text>
      <text x="108" y="452" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">Confluence만 최종 원본</text>
      <text x="108" y="468" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">로컬 산출물은 초안</text>

      <rect x="408" y="408" width="224" height="72" rx="6" fill="#ffffff" stroke="rgba(45,49,66,0.20)" stroke-width="1"/>
      <text x="432" y="432" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif">검증</text>
      <text x="432" y="452" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">자동: 형식 · 링크 · 누락</text>
      <text x="432" y="468" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">사람: 정책 · 품질 · 의도</text>

      <rect x="732" y="408" width="224" height="72" rx="6" fill="#ffffff" stroke="rgba(45,49,66,0.20)" stroke-width="1"/>
      <text x="756" y="432" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif">반영</text>
      <text x="756" y="452" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">자동 게시하지 않음</text>
      <text x="756" y="468" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">사람이 확인 후 반영</text>

      <line x1="40" y1="536" x2="1000" y2="536" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>
      <text x="40" y="556" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">범례</text>
      <rect x="116" y="548" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="152" y="558" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">기획자가 만드는 초안</text>
      <polygon points="340,554 352,548 364,554 352,560" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <text x="376" y="558" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">검증 게이트</text>
      <line x1="540" y1="556" x2="572" y2="556" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="584" y="558" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">수정 루프</text>
      <line x1="724" y1="556" x2="756" y2="556" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="768" y="558" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Confluence 반영</text>
    </svg>
  </main>
</body>
</html>

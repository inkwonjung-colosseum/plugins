<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Confluence document workflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --soft: #7a8399;
      --accent: #eb6c36;
      --accent-tint: rgba(235,108,54,0.08);
      --link: #2e5aa8;
      --rule: rgba(45,49,66,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 48px 32px;
    }

    .frame {
      width: min(100%, 1240px);
      margin: 0 auto;
      overflow-x: auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.12;
      margin-bottom: 24px;
    }

    svg {
      display: block;
      min-width: 1080px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Swimlane · planning workflow</p>
    <h1>Confluence source to validated planning document</h1>

    <svg viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
      <title id="title">기획 팀 Confluence 문서 workflow</title>
      <desc id="desc">Confluence 원본 문서를 로컬 읽기 전용 스냅샷으로 가져오고, plan-format으로 기능설계서와 정책서 초안을 만든 뒤 plan-review의 근거, 결정·범위, 실행·검증 가능성 검토를 거쳐 사람이 Confluence에 반영하는 swimlane 다이어그램.</desc>
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <text x="32" y="68" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">SOURCE</text>
      <text x="32" y="200" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">PLANNING</text>
      <text x="32" y="332" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">TEMPLATE</text>
      <text x="32" y="464" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">REVIEW</text>

      <line x1="128" y1="108" x2="1088" y2="108" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>
      <line x1="128" y1="240" x2="1088" y2="240" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>
      <line x1="128" y1="372" x2="1088" y2="372" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>
      <line x1="128" y1="504" x2="1088" y2="504" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>

      <path d="M 292 72 C 352 72, 352 176, 412 176" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 540 176 C 600 176, 600 308, 660 308" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 788 308 C 848 308, 848 440, 908 440" fill="none" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <path d="M 980 472 C 980 548, 544 548, 476 220" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <path d="M 980 392 C 980 320, 976 260, 976 196" fill="none" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <path d="M 976 136 C 976 112, 1000 112, 1000 88" fill="none" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>

      <rect x="332" y="112" width="64" height="16" rx="2" fill="#f5f5f5"/>
      <text x="364" y="124" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">EXPORT</text>
      <rect x="580" y="236" width="68" height="16" rx="2" fill="#f5f5f5"/>
      <text x="614" y="248" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">STRUCTURE</text>
      <rect x="828" y="368" width="64" height="16" rx="2" fill="#f5f5f5"/>
      <text x="860" y="380" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">VERIFY</text>
      <rect x="676" y="536" width="84" height="16" rx="2" fill="#f5f5f5"/>
      <text x="718" y="548" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">FIX + RETRY</text>
      <rect x="944" y="276" width="72" height="16" rx="2" fill="#f5f5f5"/>
      <text x="980" y="288" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">APPROVED</text>

      <rect x="148" y="40" width="144" height="64" rx="32" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="220" y="64" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confluence 원본</text>
      <text x="220" y="80" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">source of truth</text>

      <rect x="412" y="144" width="128" height="64" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="476" y="168" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">로컬 스냅샷</text>
      <text x="476" y="184" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">read-only markdown</text>

      <rect x="396" y="180" width="160" height="28" rx="4" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="476" y="198" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">registry · index · tree</text>

      <rect x="412" y="276" width="128" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="476" y="300" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">기획 입력 정리</text>
      <text x="476" y="316" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">AI memo + planner notes</text>

      <rect x="660" y="276" width="128" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="724" y="300" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">plan-format</text>
      <text x="724" y="316" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">feature spec + policy</text>

      <polygon points="980,392 1060,440 980,488 900,440" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <text x="980" y="424" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">plan-review</text>
      <text x="980" y="440" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">evidence / scope / execution</text>
      <text x="980" y="454" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">conservative verdict</text>

      <rect x="1000" y="56" width="88" height="64" rx="6" fill="#ffffff" stroke="#2e5aa8" stroke-width="1"/>
      <text x="1044" y="80" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confluence</text>
      <text x="1044" y="96" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">update / create</text>

      <rect x="896" y="136" width="160" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="976" y="160" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">반영 계획</text>
      <text x="976" y="176" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">human handoff only</text>

      <line x1="40" y1="608" x2="1080" y2="608" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>
      <text x="40" y="628" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <rect x="128" y="620" width="24" height="12" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="164" y="630" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Source / snapshot</text>
      <rect x="328" y="620" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="364" y="630" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Planner-owned draft</text>
      <polygon points="572,626 584,620 596,626 584,632" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <text x="608" y="630" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Validation gate</text>
      <line x1="780" y1="628" x2="812" y2="628" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="824" y="630" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Revision loop</text>
      <line x1="976" y1="628" x2="1008" y2="628" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="1020" y="630" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Publish handoff</text>
    </svg>
  </main>
</body>
</html>

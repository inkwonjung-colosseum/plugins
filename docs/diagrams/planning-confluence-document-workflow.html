<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Confluence document workflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --soft: #7a8399;
      --accent: #eb6c36;
      --accent-tint: rgba(235,108,54,0.08);
      --link: #2e5aa8;
      --rule: rgba(45,49,66,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 48px 32px;
    }

    .frame {
      width: min(100%, 1240px);
      margin: 0 auto;
      overflow-x: auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.12;
      margin-bottom: 24px;
    }

    svg {
      display: block;
      min-width: 1080px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Swimlane · planning workflow</p>
    <h1>Confluence source to team handoff document flow</h1>

    <svg viewBox="0 0 1120 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
      <title id="title">기획 팀 Confluence 문서 workflow</title>
      <desc id="desc">Confluence 원본을 로컬 읽기 전용 스냅샷으로 가져온 뒤, 기획 입력을 plan-format으로 기능설계서와 정책서 초안으로 저장하고, plan-review를 거쳐 사람이 팀의 Confluence 반영 절차로 넘기는 swimlane 다이어그램.</desc>
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <text x="32" y="68" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">SOURCE</text>
      <text x="32" y="200" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">SNAPSHOT</text>
      <text x="32" y="332" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">DRAFT</text>
      <text x="32" y="504" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">REVIEW</text>

      <line x1="128" y1="108" x2="1088" y2="108" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>
      <line x1="128" y1="240" x2="1088" y2="240" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>
      <line x1="128" y1="404" x2="1088" y2="404" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>
      <line x1="128" y1="596" x2="1088" y2="596" stroke="rgba(45,49,66,0.12)" stroke-width="1"/>

      <path d="M 288 72 C 344 72, 344 176, 400 176" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 556 176 C 612 176, 612 332, 668 332" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 332 332 L 668 332" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 780 332 L 876 332" fill="none" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <path d="M 992 332 L 992 486" fill="none" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <path d="M 912 516 C 800 566, 720 566, 612 516" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <path d="M 1008 556 C 1008 628, 968 628, 924 628" fill="none" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <path d="M 900 628 C 824 628, 824 100, 976 88" fill="none" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <path d="M 748 388 C 748 440, 820 440, 860 388" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

      <rect x="320" y="112" width="64" height="16" rx="2" fill="#f5f5f5"/>
      <text x="352" y="124" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">EXPORT</text>
      <rect x="588" y="236" width="68" height="16" rx="2" fill="#f5f5f5"/>
      <text x="622" y="248" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">READ ONLY</text>
      <rect x="812" y="320" width="44" height="16" rx="2" fill="#f5f5f5"/>
      <text x="834" y="332" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">YES</text>
      <rect x="776" y="420" width="44" height="16" rx="2" fill="#f5f5f5"/>
      <text x="798" y="432" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">NO</text>
      <rect x="728" y="544" width="84" height="16" rx="2" fill="#f5f5f5"/>
      <text x="770" y="556" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">FIX + RETRY</text>
      <rect x="940" y="596" width="112" height="16" rx="2" fill="#f5f5f5"/>
      <text x="996" y="608" fill="#2e5aa8" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">PASS / CONDITIONAL</text>

      <rect x="144" y="40" width="144" height="64" rx="32" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="216" y="64" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confluence 원본</text>
      <text x="216" y="80" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">source of truth</text>

      <rect x="976" y="56" width="112" height="64" rx="6" fill="#ffffff" stroke="#2e5aa8" stroke-width="1"/>
      <text x="1032" y="80" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confluence</text>
      <text x="1032" y="96" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">manual update</text>

      <rect x="400" y="144" width="156" height="64" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="478" y="168" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">로컬 스냅샷</text>
      <text x="478" y="184" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">read-only markdown</text>
      <text x="478" y="198" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">registry · index · tree</text>

      <rect x="144" y="300" width="188" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="238" y="324" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">기획 입력</text>
      <text x="238" y="340" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">AI output + planner notes</text>

      <rect x="668" y="300" width="112" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="724" y="324" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">plan-format</text>
      <text x="724" y="340" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">format only</text>

      <polygon points="932,280 1008,332 932,384 856,332" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <text x="932" y="326" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">초안 생성 가능?</text>
      <text x="932" y="342" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">필수 입력 확인</text>

      <rect x="644" y="424" width="208" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="748" y="446" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">저장 보류</text>
      <text x="748" y="462" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">보완 질문만 반환</text>

      <rect x="892" y="452" width="200" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="992" y="476" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">초안 폴더 저장</text>
      <text x="992" y="492" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">기능설계서 + 정책서</text>
      <text x="992" y="506" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">planning/[name]--timestamp/</text>

      <polygon points="992,548 1072,596 992,644 912,596" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <text x="992" y="580" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">plan-review</text>
      <text x="992" y="596" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">evidence / scope / execution</text>
      <text x="992" y="610" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">보수적 결과</text>

      <rect x="700" y="600" width="192" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="796" y="622" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">팀 handoff</text>
      <text x="796" y="638" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">사람이 반영 여부 결정</text>

      <line x1="40" y1="704" x2="1080" y2="704" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>
      <text x="40" y="724" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
      <rect x="128" y="716" width="24" height="12" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="164" y="726" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Source / snapshot</text>
      <rect x="328" y="716" width="24" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="364" y="726" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Planner-owned draft</text>
      <polygon points="572,722 584,716 596,722 584,728" fill="#ffffff" stroke="#eb6c36" stroke-width="1"/>
      <text x="608" y="726" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Gate</text>
      <line x1="728" y1="724" x2="760" y2="724" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="772" y="726" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Revision / blocked path</text>
      <line x1="976" y1="724" x2="1008" y2="724" stroke="#2e5aa8" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="1020" y="726" fill="#4f5d75" font-size="8" font-family="'Geist', sans-serif">Manual handoff</text>
    </svg>
  </main>
</body>
</html>

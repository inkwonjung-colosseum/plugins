<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>product-team-kit workflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --soft: #7a8399;
      --rule: rgba(45,49,66,0.12);
      --accent: #eb6c36;
      --accent-tint: rgba(235,108,54,0.08);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 48px 32px;
    }

    .frame {
      width: min(100%, 1200px);
      margin: 0 auto;
      overflow-x: auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.12;
      margin-bottom: 24px;
    }

    svg {
      display: block;
      min-width: 1000px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Flowchart · product-team-kit</p>
    <h1>Planning input to team handoff workflow</h1>

    <svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
      <title id="title">product-team-kit 기획 입력 검토 흐름</title>
      <desc id="desc">기획 입력이 plan-format을 거쳐 초안 생성 가능성을 판단하고, 기능설계서와 정책서 초안 생성 후 plan-review의 발행 전 검토를 통과하면 팀의 반영 절차로 넘어간다. 정보가 부족하면 저장을 보류하고 보완 질문을 남기며, 수정이 필요하면 초안을 수정한 뒤 재검토한다.</desc>
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <line x1="500" y1="88" x2="500" y2="120" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="500" y1="176" x2="500" y2="204" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="612" y1="260" x2="736" y2="260" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="500" y1="316" x2="500" y2="348" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <line x1="500" y1="404" x2="500" y2="436" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <line x1="500" y1="492" x2="500" y2="520" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="500" y1="632" x2="500" y2="660" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <path d="M 612 576 L 736 576" fill="none" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <path d="M 824 548 C 824 492, 652 512, 612 464" fill="none" stroke="#4f5d75" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

      <rect x="640" y="248" width="40" height="16" rx="2" fill="#f5f5f5"/>
      <text x="660" y="260" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">NO</text>
      <rect x="480" y="328" width="40" height="16" rx="2" fill="#f5f5f5"/>
      <text x="500" y="340" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">YES</text>
      <rect x="480" y="640" width="96" height="16" rx="2" fill="#f5f5f5"/>
      <text x="528" y="652" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">PASS / CONDITIONAL</text>
      <rect x="632" y="564" width="72" height="16" rx="2" fill="#f5f5f5"/>
      <text x="668" y="576" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">NEEDS EDIT</text>

      <rect x="400" y="40" width="200" height="48" rx="24" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
      <text x="500" y="68" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">기획 입력</text>

      <rect x="388" y="120" width="224" height="56" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="144" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">plan-format</text>
      <text x="500" y="160" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">기능설계서 / 정책서 formatter</text>

      <polygon points="500,204 612,260 500,316 388,260" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="256" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">초안 생성 가능?</text>
      <text x="500" y="272" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">필수 정보 충족 여부</text>

      <rect x="736" y="232" width="184" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="828" y="254" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">저장 보류</text>
      <text x="828" y="270" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">보완 질문 반환</text>

      <rect x="360" y="348" width="280" height="56" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="500" y="372" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">기능설계서 + 정책서 초안</text>
      <text x="500" y="388" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">planning/[name]--timestamp/</text>

      <rect x="388" y="436" width="224" height="56" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="460" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">plan-review</text>
      <text x="500" y="476" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">근거 / 범위 / 실행 가능성</text>

      <polygon points="500,520 612,576 500,632 388,576" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="572" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">발행 전 검토</text>
      <text x="500" y="588" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">pass / conditional / edit</text>

      <rect x="736" y="548" width="176" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="824" y="570" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">초안 수정</text>
      <text x="824" y="586" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">수정 후 재검토</text>

      <rect x="380" y="660" width="240" height="48" rx="24" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="500" y="688" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">팀의 반영 절차</text>
      <text x="500" y="702" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">manual handoff</text>
    </svg>
  </main>
</body>
</html>

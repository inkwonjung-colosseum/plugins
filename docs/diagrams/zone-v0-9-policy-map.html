<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone v0.9 policy map</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #f5f5f5;
      --ink: #2d3142;
      --muted: #4f5d75;
      --soft: #7a8399;
      --accent: #eb6c36;
      --link: #2e5aa8;
      --rule: rgba(45,49,66,0.12);
      --sans: 'Geist', system-ui, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 48px 32px;
    }

    .frame {
      width: min(100%, 1220px);
      margin: 0 auto;
      overflow-x: auto;
    }

    .eyebrow {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.12;
      margin-bottom: 24px;
    }

    svg {
      display: block;
      min-width: 1120px;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Product schematic · WMS Zone v0.9</p>
    <h1>Zone은 공간명이 아니라 WMS 판단 기준이다</h1>

      <rect x="708" y="520" width="332" height="176" rx="8" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>

      <text x="736" y="604" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">정상: INBOUND → STORAGE → OUTBOUND</text>

      <text x="736" y="644" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace">차단: STORAGE → INBOUND, DEFECT → 전 Layer</text>

      <line x1="44" y1="732" x2="1076" y2="732" stroke="rgba(45,49,66,0.12)" stroke-width="0.8"/>

  </main>
</body>
</html>
